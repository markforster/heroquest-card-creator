<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Help is coming soon | HeroQuest Card Creator</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Georgia, "Times New Roman", serif;
        background: #11100e;
        color: #f4ead7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
          radial-gradient(circle at 50% 0, rgba(190, 128, 50, 0.22), transparent 42rem),
          repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 8px),
          #11100e;
      }

      main {
        width: min(42rem, 100%);
        padding: clamp(2.5rem, 8vw, 5rem);
        text-align: center;
        border: 1px solid rgba(225, 170, 91, 0.45);
        background: rgba(25, 22, 18, 0.86);
        box-shadow: 0 2rem 5rem rgba(0, 0, 0, 0.42);
      }

      .eyebrow {
        margin: 0 0 1.25rem;
        color: #d9a957;
        font-family: Arial, sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: #f3d9a8;
        font-size: clamp(2.4rem, 8vw, 4.6rem);
        font-weight: 400;
        line-height: 0.98;
      }

      p:last-child {
        max-width: 29rem;
        margin: 1.75rem auto 0;
        color: #c9bdab;
        font-size: clamp(1rem, 3vw, 1.2rem);
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">HeroQuest Card Creator</p>
      <h1>Help is coming soon</h1>
      <p>A complete guide to creating, organising, exporting, and printing your cards is being prepared.</p>
    </main>
  </body>
</html>
